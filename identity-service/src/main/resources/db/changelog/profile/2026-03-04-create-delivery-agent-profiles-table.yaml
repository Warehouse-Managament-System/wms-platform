databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-delivery-agent-profiles-table
      author: anar
      changes:
        - createTable:
            tableName: delivery_agent_profiles
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: warehouse_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_info
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: delivery_agent_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_delivery_agent_profiles_users_user_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: delivery_agent_profiles
            baseColumnNames: warehouse_id
            referencedTableName: warehouses
            referencedColumnNames: id
            constraintName: fk_delivery_agent_profiles_warehouses_warehouse_id
      rollback:
        - dropTable:
            tableName: delivery_agent_profiles

