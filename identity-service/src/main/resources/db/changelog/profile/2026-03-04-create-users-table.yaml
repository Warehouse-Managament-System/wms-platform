databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-users-table
      author: gulay
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamp
        - sql:
            sql: |
              -- Partial unique index for email
              CREATE UNIQUE INDEX uk_users_email_partial
              ON users(email)
              WHERE deleted_at IS NULL;

              ALTER TABLE users
                ADD CONSTRAINT ck_users_role
                CHECK (role IN ('SUPER_ADMIN', 'WAREHOUSE_OWNER', 'CUSTOMER', 'STAFF', 'DELIVERY_AGENT'));

              ALTER TABLE users
                ADD CONSTRAINT ck_users_status
                CHECK (status IN ('PENDING_APPROVAL', 'ACTIVE', 'INACTIVE', 'SUSPENDED', 'DEACTIVATED'));

              ALTER TABLE users
                ADD CONSTRAINT ck_users_first_name
                CHECK (LENGTH(first_name) BETWEEN 2 AND 60);

              ALTER TABLE users
                ADD CONSTRAINT ck_users_last_name
                CHECK (LENGTH(last_name) BETWEEN 2 AND 60);

              ALTER TABLE users
                ADD CONSTRAINT ck_users_email
                CHECK (email ~* '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$');

              ALTER TABLE users
                ADD CONSTRAINT ck_users_password
                CHECK (LENGTH(password) >= 60);
