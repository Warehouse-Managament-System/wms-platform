databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-users-table
      author: gulay
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_email
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: phone
                  type: VARCHAR(50)
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            comment: CHECK constraints for enum columns (Liquibase Pro feature)
            sql: |
              ALTER TABLE users
                  ADD CONSTRAINT ck_users_role
                  CHECK (role IN ('SUPER_ADMIN', 'WAREHOUSE_OWNER', 'CUSTOMER', 'STAFF', 'DELIVERY_AGENT'));

              ALTER TABLE users
                  ADD CONSTRAINT ck_users_status
                  CHECK (status IN ('PENDING_APPROVAL', 'ACTIVE', 'INACTIVE', 'SUSPENDED', 'DEACTIVATED'));
