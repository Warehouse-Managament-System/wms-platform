databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-warehouse-owner-profiles-table
      author: said
      changes:
        - createTable:
            tableName: warehouse_owner_profiles
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: company_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: tax_id
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: address
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: country
                  type: VARCHAR(25)
                  constraints:
                    nullable: false

              - column:
                  name: approved_by
                  type: UUID

              - column:
                  name: approved_at
                  type: timestampz


        - addForeignKeyConstraint:
            baseTableName: warehouse_owner_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_warehouse_owner_profiles_users_user_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: warehouse_owner_profiles
            baseColumnNames: approved_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_warehouse_owner_profiles_users_approved_by
