databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-warehouse-owner-profiles-table
      author: said
      changes:
        - createTable:
            tableName: warehouse_owner_profiles
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_warehouse_owner_profiles
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: company_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: tax_id
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: approved_by
                  type: UUID
              - column:
                  name: approved_at
                  type: TIMESTAMPTZ
              - column:
                  name: rejection_reason
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMPTZ
        - addForeignKeyConstraint:
            baseTableName: warehouse_owner_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_warehouse_owner_profiles_users_user_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: warehouse_owner_profiles
            baseColumnNames: approved_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_warehouse_owner_profiles_users_approved_by
            onDelete: SET NULL
        - sql:
            sql: |
              -- Partial unique index for tax_id
              CREATE UNIQUE INDEX uk_warehouse_owner_profiles_tax_id_partial
              ON warehouse_owner_profiles(tax_id)
              WHERE deleted_at IS NULL;

              -- Partial unique index for user_id (soft delete üçün)
              CREATE UNIQUE INDEX uk_warehouse_owner_profiles_user_id_partial
              ON warehouse_owner_profiles(user_id)
              WHERE deleted_at IS NULL;
              ALTER TABLE warehouse_owner_profiles
                ADD CONSTRAINT ck_warehouse_owner_profiles_company_name
                CHECK (LENGTH(company_name) BETWEEN 2 AND 100);

              ALTER TABLE warehouse_owner_profiles
                ADD CONSTRAINT ck_warehouse_owner_profiles_tax_id
                CHECK (tax_id ~* '^[A-Za-z0-9-]{5,16}$');

              ALTER TABLE warehouse_owner_profiles
                ADD CONSTRAINT ck_warehouse_owner_profiles_address
                CHECK (LENGTH(address) BETWEEN 5 AND 255);

              ALTER TABLE warehouse_owner_profiles
                ADD CONSTRAINT ck_warehouse_owner_profiles_city
                CHECK (LENGTH(city) BETWEEN 2 AND 100);

              ALTER TABLE warehouse_owner_profiles
                ADD CONSTRAINT ck_warehouse_owner_profiles_country
                CHECK (LENGTH(country) BETWEEN 2 AND 100);
