databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-warehouse-owner-profiles-table
      author: said
      changes:
        - createTable:
            tableName: warehouse_owner_profiles
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_warehouse_owner_profiles
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_warehouse_owner_profiles_user_id
              - column:
                  name: company_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: tax_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_warehouse_owner_profiles_tax_id
              - column:
                  name: address
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(25)
                  constraints:
                    nullable: false
              - column:
                  name: approved_by
                  type: UUID
              - column:
                  name: approved_at
                  type: TIMESTAMPTZ
              - column:
                  name: rejection_reason
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMPTZ
        - addForeignKeyConstraint:
            baseTableName: warehouse_owner_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_warehouse_owner_profiles_users_user_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: warehouse_owner_profiles
            baseColumnNames: approved_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_warehouse_owner_profiles_users_approved_by
            onDelete: SET NULL
