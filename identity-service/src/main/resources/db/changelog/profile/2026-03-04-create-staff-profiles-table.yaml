databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-staff-profiles-table
      author: anar
      changes:
        - createTable:
            tableName: staff_profiles
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_staff_profiles
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_staff_profiles_user_id
              - column:
                  name: warehouse_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: staff_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_staff_profiles_users_user_id
            onDelete: CASCADE
        - sql:
            sql: |
              ALTER TABLE staff_profiles
                ADD CONSTRAINT ck_staff_profiles_position
                CHECK (LENGTH(position) BETWEEN 2 AND 100);
