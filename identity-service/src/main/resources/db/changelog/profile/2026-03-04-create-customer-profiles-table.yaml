databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-customer-profiles-table
      author: gulay
      changes:
        - createTable:
            tableName: customer_profiles
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_customer_profiles
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customer_profiles_user_id
              - column:
                  name: company_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: tax_id
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_customer_profiles_tax_id
              - column:
                  name: contact_person_name
                  type: VARCHAR(60)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: customer_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_customer_profiles_users_user_id
            onDelete: CASCADE
        - sql:
            sql: |
              ALTER TABLE customer_profiles
                ADD CONSTRAINT ck_customer_profiles_company_name
                CHECK (LENGTH(company_name) BETWEEN 2 AND 100);

              ALTER TABLE customer_profiles
                ADD CONSTRAINT ck_customer_profiles_tax_id
                CHECK (tax_id ~* '^[A-Za-z0-9-]{5,16}$');

              ALTER TABLE customer_profiles
                ADD CONSTRAINT ck_customer_profiles_contact_person_name
                CHECK (LENGTH(contact_person_name) BETWEEN 2 AND 60);
