databaseChangeLog:
  - changeSet:
      id: 2026-03-04-create-customer-profiles-table
      author: gulay
      changes:

        - createTable:
            tableName: customer_profiles
            columns:

              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: company_name
                  type: VARCHAR(255)

              - column:
                  name: tax_id
                  type: VARCHAR(100)
                  constraints:
                    unique: true

              - column:
                  name: contact_person_name
                  type: VARCHAR(255)

        - addForeignKeyConstraint:
            baseTableName: customer_profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_customer_profiles_users_user_id
