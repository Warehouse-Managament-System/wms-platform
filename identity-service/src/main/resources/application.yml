server:
  port: 8081

spring:


  application:
    name: identity
  datasource:
    url: jdbc:postgresql://localhost:5433/identity_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
jwt:
  secret: mysecretkeymysecretkeymysecretkeymysecretkey
  access-exp: 360_000
  refresh-exp: 420_000



  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled : true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ${spring.application.name}-group

mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME:your-email@gmail.com}
  password: ${MAIL_PASSWORD:your-app-password}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

app:
  base-url: http://localhost:8080
  confirmation:
    token-validity-hours: 24

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  otlp:
    tracing:
      endpoint: http://localhost:4317
  tracing:
    sampling:
      probability: 1.0


