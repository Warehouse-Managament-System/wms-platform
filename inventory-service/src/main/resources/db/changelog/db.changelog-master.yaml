databaseChangeLog:
  - changeSet:
      id: 2026-03-01-create-schema
      author: Ali Ramazanov
      changes:
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS inventory_service

  - changeSet:
      id: 2026-03-01-create-outbox-events-table
      author: Ali Ramazanov
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: TIMESTAMPTZ
        - sql:
            comment: CHECK constraint and partial index require raw SQL (Liquibase Pro features)
            sql: |
              ALTER TABLE outbox_events
                  ADD CONSTRAINT ck_outbox_events_status
                  CHECK (status IN ('PENDING', 'SENT', 'FAILED'));

              CREATE INDEX idx_outbox_pending
                  ON outbox_events(status) WHERE status = 'PENDING';
        - createIndex:
            indexName: idx_outbox_events_created_at
            tableName: outbox_events
            columns:
              - column:
                  name: created_at
